<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Admin{% endblock %} — FinTech Admin Panel</title>
<link rel="icon" type="image/png" href="{{ url_for('static', filename='fintech-logo.png') }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='chat.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
</head>
<body>

<div class="app-shell">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-wrap">
        <img src="{{ url_for('static', filename='logo-wide.png') }}" alt="FinTech" class="brand-logo">
      </div>
      <div class="logo-text-wrap">
        <span class="logo-tagline">Admin Panel</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <p class="nav-label">Navigation</p>
      <a href="{{ url_for('admin.dashboard') }}" class="nav-item {% if request.endpoint == 'admin.dashboard' %}active{% endif %}">
        <span class="nav-icon">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.9" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        </span>
        Dashboard
      </a>
      <a href="{{ url_for('admin.queries') }}" class="nav-item {% if request.endpoint == 'admin.queries' %}active{% endif %}">
        <span class="nav-icon">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.9" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </span>
        User Queries
      </a>
      <a href="{{ url_for('admin.feedback') }}" class="nav-item {% if request.endpoint == 'admin.feedback' %}active{% endif %}">
        <span class="nav-icon">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.9" viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>
        </span>
        Feedback
      </a>
      <a href="{{ url_for('admin.knowledge') }}" class="nav-item {% if request.endpoint == 'admin.knowledge' %}active{% endif %}">
        <span class="nav-icon">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.9" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        </span>
        Knowledge Base
      </a>
      <a href="{{ url_for('admin.test_chatbot') }}" class="nav-item {% if request.endpoint == 'admin.test_chatbot' %}active{% endif %}">
        <span class="nav-icon">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.9" viewBox="0 0 24 24"><path d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
        </span>
        Test Chatbot
      </a>
    </nav>

    <div class="sidebar-footer">
      <a href="{{ url_for('user_widget.user_widget_demo') }}" target="_blank" class="nav-item">
        <span class="nav-icon">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.9" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </span>
        User Portal
      </a>
      <a href="{{ url_for('admin.logout') }}" class="nav-item nav-logout">
        <span class="nav-icon">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.9" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </span>
        Logout
      </a>
      <div class="user-pill" style="margin-top: 6px;">
        <div class="user-avatar-icon">A</div>
        <div class="user-info">
          <span class="user-name">Administrator</span>
          <span class="user-role">Admin Access</span>
        </div>
        <div class="online-dot"></div>
      </div>
    </div>
  </aside>

  <!-- Sidebar backdrop (mobile) -->
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <!-- Main -->
  <main class="chat-main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" id="menuBtn" aria-label="Toggle menu">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div class="topbar-brand">
          <img src="{{ url_for('static', filename='fintech-logo.png') }}" alt="FinTech Admin" class="topbar-logo">
          <div>
            <div class="topbar-title">{% block page_title %}Dashboard{% endblock %}</div>
            <div class="topbar-status">
              <span class="status-dot"></span>
              <span class="status-text">FinTech Admin Panel</span>
            </div>
          </div>
        </div>
      </div>
      <div class="topbar-actions">
        <span class="admin-badge">Admin</span>
      </div>
    </header>

    <div class="admin-content">
      {% block content %}{% endblock %}
    </div>
  </main>

</div>

<script>
  const menuBtn  = document.getElementById('menuBtn');
  const sidebar  = document.getElementById('sidebar');
  const backdrop = document.getElementById('sidebarBackdrop');
  menuBtn.addEventListener('click', () => {
    sidebar.classList.toggle('open');
    backdrop.classList.toggle('visible');
  });
  backdrop.addEventListener('click', () => {
    sidebar.classList.remove('open');
    backdrop.classList.remove('visible');
  });
</script>

{% block scripts %}{% endblock %}
</body>
</html>
